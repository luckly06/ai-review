name: AI Review

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: AI Review with MiniMax
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          FEISHU_REVIEW_BOT_APP_ID: ${{ secrets.FEISHU_REVIEW_BOT_APP_ID }}
          FEISHU_REVIEW_BOT_APP_SECRET: ${{ secrets.FEISHU_REVIEW_BOT_APP_SECRET }}
          FEISHU_REVIEW_BOT_CHAT_ID: ${{ secrets.FEISHU_REVIEW_BOT_CHAT_ID }}
        run: node .github/scripts/ai-review.js